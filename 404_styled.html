<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 - Seite nicht gefunden | MASESites</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .lang-switch {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .lang-switch button {
      border: 1px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.15);
      color: #fff;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }
    .lang-switch button.active {
      background: #fff;
      color: #667eea;
      border-color: #fff;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-size: 8rem;
      font-weight: 900;
      margin-bottom: 1rem;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    p {
      font-size: 1.125rem;
      margin-bottom: 2rem;
      opacity: 0.9;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      background: white;
      color: #667eea;
      padding: 1rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0,0,0,0.3);
    }
    @media (max-width: 640px) {
      body {
        padding: 1.25rem;
      }

      .lang-switch {
        position: static;
        justify-content: center;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 5rem;
      }
      h2 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="lang-switch" aria-label="Language Switch">
    <button type="button" data-lang="de" class="active">DE</button>
    <button type="button" data-lang="en">EN</button>
  </div>
  <div class="container">
    <h1>404</h1>
    <h2 id="err-title">Seite nicht gefunden</h2>
    <p id="err-text">Die angeforderte Seite existiert nicht oder wurde verschoben.</p>
    <a href="/" class="button" id="err-home">Zurück zur Startseite</a>
  </div>
  <script>
    (function () {
      var copy = {
        de: {
          title: '404 - Seite nicht gefunden | MASESites',
          heading: 'Seite nicht gefunden',
          text: 'Die angeforderte Seite existiert nicht oder wurde verschoben.',
          home: 'Zurück zur Startseite'
        },
        en: {
          title: '404 - Page not found | MASESites',
          heading: 'Page not found',
          text: 'The requested page does not exist or has been moved.',
          home: 'Back to home page'
        }
      };

      var urlLang = new URLSearchParams(window.location.search).get('lang');
      var lang = (urlLang === 'en' || urlLang === 'de') ? urlLang : localStorage.getItem('lang');
      if (lang !== 'en' && lang !== 'de') lang = 'de';

      var title = document.getElementById('err-title');
      var text = document.getElementById('err-text');
      var home = document.getElementById('err-home');
      var buttons = document.querySelectorAll('.lang-switch button');

      function applyLanguage(nextLang) {
        var t = copy[nextLang] || copy.de;
        document.title = t.title;
        document.documentElement.lang = nextLang === 'de' ? 'de-CH' : 'en';
        title.textContent = t.heading;
        text.textContent = t.text;
        home.textContent = t.home;
        home.setAttribute('href', '/?lang=' + nextLang);
        buttons.forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === nextLang);
        });
        localStorage.setItem('lang', nextLang);
      }

      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          applyLanguage(btn.getAttribute('data-lang'));
        });
      });

      applyLanguage(lang);
    })();
  </script>
</body>
</html>

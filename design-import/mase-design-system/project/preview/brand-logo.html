<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .lockup { display: flex; align-items: center; gap: 24px; padding: 12px 0 18px; border-bottom: 1px dashed var(--line); }
  .mark { width: 72px; height: 72px; border-radius: 14px; background: #3a9bff; display: grid; place-items: center; }
  .mark svg { width: 56px; height: 56px; }
  .wm { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 44px; color: #000; line-height: 1; }
  .dark-lockup { background: #0a0e27; padding: 16px 22px; border-radius: 14px; display: inline-flex; align-items: center; gap: 16px; }
  .dark-lockup .wm { color: #fff; font-size: 32px; }
  .dark-lockup .mark { width: 44px; height: 44px; }
  .dark-lockup .mark svg { width: 30px; height: 30px; }
  .legend { font-size: 12px; color: var(--fg-3); margin: 12px 0 0; line-height: 1.5; max-width: 60ch; }
</style>
<div class="card-grid">
  <div class="lockup">
    <div class="mark">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="3" fill="white"/>
      </svg>
    </div>
    <span class="wm">MASE</span>
    <div class="dark-lockup">
      <div class="mark">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="3" fill="white"/>
        </svg>
      </div>
      <span class="wm">MASE</span>
    </div>
  </div>
  <p class="legend">
    The favicon is a <code style="font-family:var(--font-mono);font-size:12px">#3a9bff</code> rounded square with an outlined hex + dot mark. The wordmark is plain text — Inter 700, uppercase, tracking 0.1em. Production renders the wordmark as text only; the mark is favicon-only.
  </p>
</div>
</body></html>

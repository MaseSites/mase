<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pill {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: 14px; border: 1px solid transparent;
    font-size: 13px; font-weight: 600;
  }
  .pill .dot { width: 10px; height: 10px; border-radius: 999px; }
  .success { background: #dcfce7; color: #166534; border-color: rgba(22,101,52,0.15); }
  .success .dot { background: #166534; }
  .error   { background: #fee2e2; color: #7f1d1d; border-color: rgba(127,29,29,0.15); }
  .error .dot { background: #7f1d1d; }
  .warning { background: #fef3c7; color: #78350f; border-color: rgba(120,53,15,0.15); }
  .warning .dot { background: #78350f; }
  .focus-demo { display: flex; gap: 16px; align-items: center; padding: 12px 0; }
  .focus-demo a { color: #0051ba; text-decoration: underline; text-underline-offset: 3px; font-weight: 600; }
  .focus-demo button {
    padding: 10px 14px; border-radius: 10px; border: 1px solid #d4d4d4; background: #fff;
    font: inherit; cursor: pointer; outline: 2px solid #0051ba; outline-offset: 2px;
  }
  .badge {
    display: inline-flex; padding: 6px 12px; border-radius: 999px;
    background: rgba(0,102,204,0.12); color: #0051ba; font-size: 12px; font-weight: 600;
  }
</style>
<div class="card-grid">
  <div class="status-row">
    <div class="pill success"><span class="dot"></span>Success · #166534 on #dcfce7</div>
    <div class="pill error"><span class="dot"></span>Error · #7f1d1d on #fee2e2</div>
    <div class="pill warning"><span class="dot"></span>Warning · #78350f on #fef3c7</div>
  </div>
  <div class="focus-demo">
    <a href="#">link · #0051ba</a>
    <span class="badge">badge · accent-soft</span>
    <button>focus ring (2px #0051ba)</button>
  </div>
</div>
</body></html>

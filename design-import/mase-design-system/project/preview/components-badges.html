<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 4px 0; }
  .label { font-size: 11px; font-weight: 600; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.08em; min-width: 100px; }
  .badge {
    padding: 0.35rem 0.8rem; border-radius: 999px;
    background: rgba(0,102,204,0.12); color: #0051ba;
    font-size: 0.8rem; font-weight: 600;
  }
  .trust {
    padding: 5px 10px; border-radius: 999px; background: #f1f5f9;
    border: 1px solid #d4d4d4; color: #475569;
    font-size: 0.78rem; font-weight: 600;
  }
  .tag {
    font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 999px;
    border: 1px solid #d4d4d4; color: #404040;
  }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.75rem;
    font-weight: 600; color: #0051ba;
  }
  .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 999px; background: rgba(0,102,204,0.12);
    color: #0051ba; font-weight: 700; font-size: 12px;
  }
</style>
<div class="card-grid">
  <div class="row"><span class="label">Badge · soft</span>
    <span class="badge">Mobile-first</span>
    <span class="badge">SEO-optimiert</span>
    <span class="badge">KI-Integration</span>
  </div>
  <div class="row"><span class="label">Trust pill</span>
    <span class="trust">Für KMU und Dienstleister</span>
    <span class="trust">Antworten in Sekunden</span>
    <span class="trust">Setup ab CHF 200</span>
  </div>
  <div class="row"><span class="label">Tag · outline</span>
    <span class="tag">Webdesign</span>
    <span class="tag">Schweiz</span>
    <span class="tag">CHF 750+</span>
  </div>
  <div class="row"><span class="label">Eyebrow</span>
    <span class="eyebrow">Matteo &amp; Severin · MASESites AG</span>
  </div>
  <div class="row"><span class="label">Step counter</span>
    <span class="num">01</span>
    <span class="num">02</span>
    <span class="num">03</span>
    <span class="mono">used in “Unser Ansatz”</span>
  </div>
</div>
</body></html>

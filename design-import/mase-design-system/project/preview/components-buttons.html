<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; padding: 6px 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    border-radius: 999px; padding: 0.7rem 1.4rem; font-weight: 600;
    font-size: 0.95rem; border: 1px solid transparent;
    font-family: var(--font-sans); cursor: pointer; line-height: 1;
    transition: transform 180ms cubic-bezier(0.22,1,0.36,1), box-shadow 180ms ease;
  }
  .btn.primary {
    color: #fff;
    background: linear-gradient(135deg, #0f766e 0%, #0b5f58 100%);
    box-shadow: 0 14px 26px rgba(15, 118, 110, 0.22);
  }
  .btn.primary-blue {
    color: #fff; background: #0051ba;
    box-shadow: 0 8px 22px rgba(58, 155, 255, 0.28);
  }
  .btn.secondary {
    background: #fff; color: #000; border-color: #d4d4d4;
  }
  .btn.ghost {
    background: #fff; color: #000; border-color: #d4d4d4;
  }
  .btn.small { padding: 0.42rem 0.88rem; font-size: 0.8rem; line-height: 1.1; }
  .label { font-size: 11px; font-weight: 600; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.08em; min-width: 90px; }
</style>
<div class="card-grid">
  <div class="row"><span class="label">Primary</span>
    <button class="btn primary">Projekt starten</button>
    <button class="btn primary small">Kostenloses Erstgespräch</button>
    <span class="mono">teal gradient · pill 999px</span>
  </div>
  <div class="row"><span class="label">Primary (blue)</span>
    <button class="btn primary-blue">KI-Assistent entdecken</button>
    <span class="mono">CSS var fallback · used in dark mode</span>
  </div>
  <div class="row"><span class="label">Secondary</span>
    <button class="btn secondary">Preise ansehen</button>
    <button class="btn ghost">Mehr erfahren</button>
    <span class="mono">white + 1px var(--line) · text #000</span>
  </div>
</div>
</body></html>

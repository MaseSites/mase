<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .row { display: grid; grid-template-columns: 90px 1fr 90px; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .row:last-child { border-bottom: 0; }
  .row .label { font-size: 11px; font-weight: 600; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.08em; }
  .row .specimen { color: var(--fg-1); font-family: var(--font-sans); font-weight: 700; line-height: 1.12; letter-spacing: -0.01em; }
  .row .size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style>
<div class="card-grid">
  <div class="row">
    <div class="label">H1 · Display</div>
    <div class="specimen" style="font-size: clamp(2.4rem, 5vw, 3.6rem)">Websites, die verkaufen.</div>
    <div class="size">clamp(2.4, 5vw, 3.6rem)<br/>700 · -0.01em</div>
  </div>
  <div class="row">
    <div class="label">H2</div>
    <div class="specimen" style="font-size: clamp(1.9rem, 4vw, 2.6rem)">Unser Ansatz</div>
    <div class="size">clamp(1.9, 4vw, 2.6rem)<br/>700</div>
  </div>
  <div class="row">
    <div class="label">H3</div>
    <div class="specimen" style="font-size: 1.2rem">KI-Integration</div>
    <div class="size">1.2rem · 700</div>
  </div>
</div>
</body></html>

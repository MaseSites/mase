<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .radius-card { display: grid; place-items: center; gap: 8px; padding: 14px; }
  .radius-box {
    width: 92px; height: 64px; background: #fff;
    border: 1px solid var(--line); box-shadow: 0 8px 25px rgba(0,0,0,.06);
  }
  .meta { text-align: center; }
  .name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style>
<div class="card-grid">
  <div class="row">
    <div class="radius-card">
      <div class="radius-box" style="border-radius:10px"></div>
      <div class="meta"><div class="name">sm (input)</div><div class="hex">10px</div></div>
    </div>
    <div class="radius-card">
      <div class="radius-box" style="border-radius:12px"></div>
      <div class="meta"><div class="name">--radius-sm</div><div class="hex">12px</div></div>
    </div>
    <div class="radius-card">
      <div class="radius-box" style="border-radius:18px"></div>
      <div class="meta"><div class="name">--radius</div><div class="hex">18px</div></div>
    </div>
    <div class="radius-card">
      <div class="radius-box" style="border-radius:24px"></div>
      <div class="meta"><div class="name">--radius-lg</div><div class="hex">24px</div></div>
    </div>
  </div>
  <div class="row" style="grid-template-columns: repeat(3, 1fr)">
    <div class="radius-card">
      <div class="radius-box" style="width:120px;border-radius:999px"></div>
      <div class="meta"><div class="name">pill (buttons / badges)</div><div class="hex">999px</div></div>
    </div>
    <div class="radius-card">
      <div class="radius-box" style="width:64px;height:64px;border-radius:50%"></div>
      <div class="meta"><div class="name">avatar / dot</div><div class="hex">50%</div></div>
    </div>
    <div class="radius-card" style="grid-column: span 1; text-align:left; padding: 0;">
      <p style="font-size:12px;color:var(--fg-3);line-height:1.5;margin:0;max-width:30ch">
        Pills dominate the interactive surface (buttons, badges, cookie buttons). Cards
        use <code style="font-family:var(--font-mono);font-size:11px">12px</code>/<code style="font-family:var(--font-mono);font-size:11px">18px</code>; hero/feature cards step up to <code style="font-family:var(--font-mono);font-size:11px">24px</code>.
      </p>
    </div>
  </div>
</div>
</body></html>

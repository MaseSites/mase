<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .wordmark-row { display: flex; align-items: center; gap: 28px; padding: 24px 0; }
  .wordmark { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #000; }
  .wordmark.lg { font-size: 56px; }
  .wordmark.md { font-size: 32px; }
  .wordmark.sm { font-size: 18px; }
  .wordmark.dark { background: #0a0e27; color: #fff; padding: 16px 22px; border-radius: 12px; }
  .specs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); border-top: 1px dashed var(--line); padding-top: 12px; }
  .specs strong { color: var(--fg-1); font-family: var(--font-sans); font-size: 12px; font-weight: 600; display: block; }
</style>
<div class="card-grid">
  <div class="wordmark-row">
    <span class="wordmark lg">MASE</span>
    <span class="wordmark md">MASE</span>
    <span class="wordmark dark">MASE</span>
  </div>
  <div class="specs">
    <div><strong>Family</strong>Inter</div>
    <div><strong>Weight</strong>700</div>
    <div><strong>Tracking</strong>0.1em</div>
    <div><strong>Transform</strong>UPPERCASE</div>
  </div>
</div>
</body></html>

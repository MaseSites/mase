<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MASE — Marketing site UI kit</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="kit-extras.css" />
  <link rel="stylesheet" href="animations.css" />
  <link rel="stylesheet" href="scroll-pack.css" />
  <link rel="stylesheet" href="flair.css" />
  <link rel="stylesheet" href="aurora.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="mase-spray" aria-hidden="true">
    <span class="mase-spray__blob s1"></span>
    <span class="mase-spray__blob s2"></span>
    <span class="mase-spray__blob s3"></span>
    <span class="mase-spray__blob s4"></span>
    <span class="mase-spray__blob s5"></span>
    <span class="mase-spray__blob s6"></span>
  </div>
  <div id="app" data-screen-label="MASE marketing site"></div>

  <!-- Tweaks shell + i18n + animation helpers -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="Animations.jsx"></script>
  <script type="text/babel" src="SmokeTransition.jsx"></script>

  <!-- Components -->
  <script type="text/babel" src="SiteHeader.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="TrustGrid.jsx"></script>
  <script type="text/babel" src="CodeProof.jsx"></script>
  <script type="text/babel" src="LivePreview.jsx"></script>
  <script type="text/babel" src="ProcessSteps.jsx"></script>
  <script type="text/babel" src="ChatWidget.jsx"></script>
  <script type="text/babel" src="AiSection.jsx"></script>
  <script type="text/babel" src="PricingTeaser.jsx"></script>
  <script type="text/babel" src="PricingSection.jsx"></script>
  <script type="text/babel" src="ContactSection.jsx"></script>
  <script type="text/babel" src="SiteFooter.jsx"></script>

  <!-- Scroll-Pack (plain JS, l\u00e4dt nach React-Render) -->
  <script defer src="scroll-pack.js"></script>
  <script defer src="flair.js"></script>
  <script defer src="aurora.js"></script>

  <!-- App -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "classic",
      "marquee": true,
      "scrollProgress": false,
      "heroMesh": true,
      "tilt": false,
      "chatAutoplay": true,
      "smokeTransition": false
    }/*EDITMODE-END*/;

    function Placeholder({ pageKey, onBack }) {
      const { t } = useT();
      return (
        <section className="placeholder-screen">
          <div className="container">
            <p className="eyebrow">{t(pageKey)}</p>
            <h1>{t("placeholder_title")}</h1>
            <p className="lead" style={{ maxWidth: "52ch" }}>
              {t("placeholder_lead")}
            </p>
            <button type="button" className="btn btn-primary" onClick={onBack}>
              {t("placeholder_back")}
            </button>
          </div>
        </section>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [preselectedProject, setPreselectedProject] = useState(null);
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [dark, setDark] = useState(false);
      const [smokeKey, setSmokeKey] = useState(0);
      const smokeDirRef = React.useRef(true);

      // Theme attribute (aurora vs classic)
      useEffect(() => {
        if (tweaks.theme === "aurora") {
          document.documentElement.setAttribute("data-theme", "aurora");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
      }, [tweaks.theme]);

      // Chat autoplay flag
      useEffect(() => {
        window.__maseChatAutoplay = !!tweaks.chatAutoplay;
      }, [tweaks.chatAutoplay]);

      // Apply dark mode class
      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
      }, [dark]);

      // Scroll to top on nav
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: "instant" });
      }, [page]);

      const go = (p) => setPage(p);

      const toggleDark = () => {
        const goingDark = !dark;
        if (tweaks.smokeTransition) {
          smokeDirRef.current = goingDark;
          setSmokeKey((k) => k + 1);
        } else {
          // Simple smooth transition handled by .theme-switching class
          document.documentElement.classList.add("theme-switching");
          setDark(goingDark);
          setTimeout(() => document.documentElement.classList.remove("theme-switching"), 360);
        }
      };

      let view;
      if (page === "home") {
        view = (
          <React.Fragment>
            <Hero onCta={(action) => {
              if (action === "pricing") go("pricing");
              else go("contact");
            }} />
            {tweaks.marquee && <Marquee />}
            <TrustGrid />
            <CodeProof />
            <LivePreview />
            <ProcessSteps />
            <AiSection />
            <PricingTeaser />
          </React.Fragment>
        );
      } else if (page === "pricing") {
        view = <PricingSection onChoose={({ base }) => {
          setPreselectedProject(base === "starter" ? "Neue Website"
            : base === "premium" ? "Neue Website" : "Neue Website");
          go("contact");
        }} />;
      } else if (page === "ai") {
        view = <AiSection />;
      } else if (page === "contact") {
        view = <ContactSection initialProject={preselectedProject} />;
      } else if (page === "services") {
        view = <Placeholder pageKey="nav_services" onBack={() => go("home")} />;
      } else if (page === "about") {
        view = <Placeholder pageKey="nav_about" onBack={() => go("home")} />;
      } else {
        view = <Placeholder pageKey="nav_home" onBack={() => go("home")} />;
      }

      return (
        <React.Fragment>
          <SiteHeader active={page} onNav={go} dark={dark} onToggleDark={toggleDark} />
          <main>{view}</main>
          <SiteFooter />
          <StickyCtaAnimated onClick={() => go("contact")} />

          <SmokeTransition
            trigger={smokeKey}
            toDark={smokeDirRef.current}
            onMidpoint={() => {
              const goingDark = smokeDirRef.current;
              document.documentElement.classList.add("theme-switching");
              document.documentElement.classList.toggle("dark", goingDark);
              setDark(goingDark);
              setTimeout(() => document.documentElement.classList.remove("theme-switching"), 600);
            }}
          />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme">
              <TweakRadio
                label="Aesthetic"
                value={tweaks.theme}
                onChange={(v) => setTweak("theme", v)}
                options={["classic", "aurora"]}
              />
            </TweakSection>
            <TweakSection label="Subtile Effekte">
              <TweakToggle
                label="Hero mesh (sanft)"
                value={tweaks.heroMesh}
                onChange={(v) => setTweak("heroMesh", v)}
              />
              <TweakToggle
                label="Marquee"
                value={tweaks.marquee}
                onChange={(v) => setTweak("marquee", v)}
              />
              <TweakToggle
                label="Chat autoplay"
                value={tweaks.chatAutoplay}
                onChange={(v) => setTweak("chatAutoplay", v)}
              />
              <TweakToggle
                label="Smoke theme transition"
                value={tweaks.smokeTransition}
                onChange={(v) => setTweak("smokeTransition", v)}
              />
            </TweakSection>
          </TweaksPanel>

          <style>{`
            ${!tweaks.heroMesh ? ".hero-mesh { display: none; }" : ""}
          `}</style>
        </React.Fragment>
      );
    }

    function Root() {
      return (
        <I18nProvider>
          <App />
        </I18nProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<Root />);
  </script>
</body>
</html>

# masesites – kompletter Stack: Website + lokales Sprachmodell.
#
#   docker compose up
#
# Startet drei Dienste:
#   ollama       das Sprachmodell-Backend (keine Cloud, kein API-Key)
#   modell       lädt einmalig das Modell und beendet sich danach
#   web          die Website samt Node-Backend auf Port 8080
#
# Beim ersten Start lädt das Modell rund 2 GB herunter – das dauert
# einige Minuten. Danach liegt es im Volume und startet sofort.

services:

  ollama:
    image: ollama/ollama:latest
    container_name: mase-ollama
    restart: unless-stopped
    volumes:
      - ollama-modelle:/root/.ollama
    # Standardmässig nur intern erreichbar. Zum Debuggen von aussen:
    # ports: ["11434:11434"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Einmal-Dienst: holt das Modell und endet. Bevorzugt qwen2.5:3b,
  # bei Problemen llama3.2:3b als Rückfallebene.
  modell:
    image: ollama/ollama:latest
    container_name: mase-modell
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      KI_MODELL: ${KI_MODELL:-qwen2.5:3b}
      KI_MODELL_FALLBACK: ${KI_MODELL_FALLBACK:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Lade Modell $$KI_MODELL …"
        if ollama pull "$$KI_MODELL"; then
          echo "Modell $$KI_MODELL bereit."
        else
          echo "$$KI_MODELL nicht verfügbar – nutze $$KI_MODELL_FALLBACK."
          ollama pull "$$KI_MODELL_FALLBACK"
        fi
    restart: "no"

  web:
    build: .
    container_name: mase-web
    restart: unless-stopped
    depends_on:
      modell:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8080}:8080"
    environment:
      KI_URL: http://ollama:11434
      KI_MODELL: ${KI_MODELL:-qwen2.5:3b}
      KI_MODELL_FALLBACK: ${KI_MODELL_FALLBACK:-llama3.2:3b}
      MS_DATEN: /daten
    volumes:
      # Datenbank, Logs und eingegangene Projektanfragen überleben Neustarts
      - mase-daten:/daten

  # Optional: HTTPS mit automatischem Zertifikat.
  # Start:  DOMAIN=deine-domain.ch docker compose --profile https up -d
  # Voraussetzung: die Domain zeigt per DNS auf diesen Server,
  # Ports 80 und 443 sind offen.
  caddy:
    image: caddy:2-alpine
    container_name: mase-caddy
    profiles: ["https"]
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-daten:/data
      - caddy-config:/config

volumes:
  ollama-modelle:
  mase-daten:
  caddy-daten:
  caddy-config:

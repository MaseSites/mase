version: '3.8'

services:
  abj-shop:
    build: .
    container_name: abj-shop
    restart: always
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      PORT: 3008
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      GATE_PASSWORD: ${GATE_PASSWORD}
      COOKIE_SECURE: "true"
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3008/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - abj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: abj-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - abj-shop
    networks:
      - abj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  abj-network:
    driver: bridge

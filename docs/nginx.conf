# NGINX Configuration für ABJ Shop auf masesites.ch
# Speichern unter: /etc/nginx/sites-available/abj-shop
# Aktivieren mit: sudo ln -s /etc/nginx/sites-available/abj-shop /etc/nginx/sites-enabled/

upstream abj_backend {
  least_conn;
  server localhost:3008 max_fails=3 fail_timeout=30s;
  server localhost:3008 max_fails=3 fail_timeout=30s backup;
}

# HTTP -> HTTPS Redirect
server {
  listen 80;
  listen [::]:80;
  server_name masesites.ch www.masesites.ch;
  
  # Let's Encrypt Verification
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  
  # Redirect to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS Server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name masesites.ch www.masesites.ch;

  # SSL Certificates (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/masesites.ch/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/masesites.ch/privkey.pem;

  # SSL Settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Logging
  access_log /var/log/nginx/abj-shop-access.log;
  error_log /var/log/nginx/abj-shop-error.log;

  # Client Upload Size
  client_max_body_size 50M;

  # Gzip Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript 
             application/x-javascript application/xml+rss 
             application/javascript application/json;

  # Root Location
  root /var/www/abj-shop/src/public;

  # API & Dynamic Routes -> Node.js
  location /testserver/client/0192481/site/abj/ {
    proxy_pass http://abj_backend;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # WebSocket Support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # Static Assets (CSS, JS, Images, Uploads)
  location /testserver/client/0192481/site/abj/css/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  location /testserver/client/0192481/site/abj/js/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  location /testserver/client/0192481/site/abj/assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /testserver/client/0192481/site/abj/img/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /testserver/client/0192481/site/abj/uploads/ {
    expires 30d;
    add_header Cache-Control "public";
  }

  # Health Check
  location /healthz {
    proxy_pass http://abj_backend;
    access_log off;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}

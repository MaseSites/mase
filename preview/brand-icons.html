<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .ico { display: grid; place-items: center; padding: 12px 6px; border: 1px solid var(--line); border-radius: 10px; gap: 8px; background: #fff; }
  .ico svg { width: 28px; height: 28px; color: #000; }
  .ico .name { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
  .note { font-size: 12px; color: var(--fg-3); line-height: 1.5; margin: 12px 0 0; max-width: 64ch; }
</style>
<div class="card-grid">
  <div class="grid">
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="6"/><line x1="16" y1="16" x2="21" y2="21"/></svg><span class="name">search</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M8 7h8"/><path d="M8 12h8"/><path d="M8 17h5"/></svg><span class="name">file-text</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15l8-8 5 5-8 8H4v-5z"/><path d="M14 7l3 3"/></svg><span class="name">edit-3</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/></svg><span class="name">settings</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19c2-4 6-8 10-10 0 0 2 4 0 8-2 4-6 6-10 7z"/><path d="M9 15l-3 3"/></svg><span class="name">sparkles</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span class="name">globe</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span class="name">pencil</span></div>
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg><span class="name">chevron-up</span></div>
  </div>
  <p class="note">
    Icons are inline SVGs in source code — 24×24, stroke-only, weight 1.8–2.5, <code style="font-family:var(--font-mono);font-size:11px">currentColor</code>. Closest CDN match: <strong>Lucide</strong>. Drop in a Lucide SVG of the same name when extending the set.
  </p>
</div>
</body></html>

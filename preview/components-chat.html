<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<style>
  body { background: #f6f9ff; }
  .chat {
    width: 380px; background: #fff; border: 1px solid #d4d4d4;
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.12);
  }
  .header {
    padding: 14px 18px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #d4d4d4;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #0066cc; }
  .header p { margin: 0; font-weight: 700; font-size: 14px; color: #000; }
  .header .status { margin-left: auto; font-size: 12px; color: #166534; font-weight: 600; }
  .body { padding: 14px 16px; display: grid; gap: 10px; background: #f8fafc; }
  .msg { max-width: 85%; padding: 9px 12px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
  .msg.bot  { background: #fff; border: 1px solid #d4d4d4; color: #000; }
  .msg.user { margin-left: auto; background: rgba(0,102,204,0.12); border: 1px solid rgba(0,102,204,0.4); color: #000; }
  .input {
    padding: 12px 16px; display: flex; justify-content: space-between;
    color: #666; font-size: 13px; border-top: 1px solid #d4d4d4;
  }
  .input .send { color: #0051ba; font-weight: 600; }
  .legend { font-size: 12px; color: var(--fg-3); margin-top: 0; max-width: 26ch; line-height: 1.5; }
  .layout { display: flex; gap: 24px; align-items: center; }
</style>
<div class="layout">
  <div class="chat">
    <div class="header">
      <span class="dot"></span><p>MASESites KI-Assistent</p><span class="status">Online</span>
    </div>
    <div class="body">
      <div class="msg bot">Hallo! Wie kann ich dir helfen?</div>
      <div class="msg user">Was kostet eine Website?</div>
      <div class="msg bot">Starter ab CHF 750. Finale Offerte nach kurzem Call.</div>
    </div>
    <div class="input"><span>Nachricht schreiben...</span><span class="send">Senden</span></div>
  </div>
  <p class="legend">Embeddable KI-Assistent widget — production component from <code style="font-family:var(--font-mono);font-size:11px">ai-assistant.css</code>.</p>
</div>
</body></html>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121418"/>
      <stop offset="0.45" stop-color="#0a0b0f"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.32" r="0.45">
      <stop offset="0" stop-color="rgba(184,156,103,0.30)"/>
      <stop offset="0.45" stop-color="rgba(184,156,103,0.12)"/>
      <stop offset="1" stop-color="rgba(184,156,103,0)"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.72)"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272b34"/>
      <stop offset="1" stop-color="#12151a"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d2b483"/>
      <stop offset="1" stop-color="#8f6d3a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#centerGlow)"/>

  <!-- ceiling lights -->
  <g opacity="0.9">
    <rect x="500" y="22" width="135" height="4" rx="2" fill="#f4e7d3"/>
    <rect x="705" y="22" width="190" height="4" rx="2" fill="#f4e7d3"/>
    <rect x="990" y="22" width="135" height="4" rx="2" fill="#f4e7d3"/>
    <rect x="1200" y="22" width="90" height="4" rx="2" fill="#f4e7d3"/>
  </g>

  <!-- side shelves -->
  <g fill="url(#metal)" stroke="rgba(255,255,255,0.08)" stroke-width="2">
    <rect x="42" y="82" width="420" height="718" rx="8"/>
    <rect x="1138" y="82" width="420" height="718" rx="8"/>
  </g>

  <!-- left shelves content -->
  <g opacity="0.96">
    <g fill="#1b1e25" stroke="rgba(255,255,255,0.06)">
      <rect x="66" y="108" width="372" height="112" rx="4"/>
      <rect x="66" y="228" width="372" height="112" rx="4"/>
      <rect x="66" y="348" width="372" height="112" rx="4"/>
      <rect x="66" y="468" width="372" height="112" rx="4"/>
      <rect x="66" y="588" width="372" height="112" rx="4"/>
    </g>
    <g fill="#101217">
      <rect x="84" y="124" width="78" height="24" rx="3"/>
      <rect x="170" y="124" width="78" height="24" rx="3"/>
      <rect x="256" y="124" width="78" height="24" rx="3"/>
      <rect x="342" y="124" width="78" height="24" rx="3"/>
      <rect x="84" y="148" width="78" height="24" rx="3"/>
      <rect x="170" y="148" width="78" height="24" rx="3"/>
      <rect x="256" y="148" width="78" height="24" rx="3"/>
      <rect x="342" y="148" width="78" height="24" rx="3"/>
    </g>
    <g fill="#c94f3d">
      <rect x="84" y="356" width="68" height="20" rx="3"/>
      <rect x="158" y="356" width="68" height="20" rx="3"/>
      <rect x="232" y="356" width="68" height="20" rx="3"/>
      <rect x="306" y="356" width="68" height="20" rx="3"/>
      <rect x="380" y="356" width="36" height="20" rx="3"/>
    </g>
    <g fill="#b89c67" opacity="0.9">
      <rect x="90" y="602" width="84" height="22" rx="3"/>
      <rect x="182" y="602" width="84" height="22" rx="3"/>
      <rect x="274" y="602" width="84" height="22" rx="3"/>
      <rect x="366" y="602" width="58" height="22" rx="3"/>
    </g>
  </g>

  <!-- right shelves content -->
  <g opacity="0.96">
    <g fill="#1b1e25" stroke="rgba(255,255,255,0.06)">
      <rect x="1162" y="108" width="372" height="112" rx="4"/>
      <rect x="1162" y="228" width="372" height="112" rx="4"/>
      <rect x="1162" y="348" width="372" height="112" rx="4"/>
      <rect x="1162" y="468" width="372" height="112" rx="4"/>
      <rect x="1162" y="588" width="372" height="112" rx="4"/>
    </g>
    <g fill="#101217">
      <rect x="1178" y="128" width="92" height="20" rx="3"/>
      <rect x="1278" y="128" width="92" height="20" rx="3"/>
      <rect x="1378" y="128" width="92" height="20" rx="3"/>
      <rect x="1478" y="128" width="40" height="20" rx="3"/>
      <rect x="1178" y="152" width="92" height="20" rx="3"/>
      <rect x="1278" y="152" width="92" height="20" rx="3"/>
      <rect x="1378" y="152" width="92" height="20" rx="3"/>
      <rect x="1478" y="152" width="40" height="20" rx="3"/>
    </g>
    <g fill="#d9cfbd">
      <rect x="1190" y="360" width="92" height="20" rx="3"/>
      <rect x="1292" y="360" width="92" height="20" rx="3"/>
      <rect x="1394" y="360" width="92" height="20" rx="3"/>
      <rect x="1496" y="360" width="22" height="20" rx="3"/>
    </g>
    <g fill="#b89c67" opacity="0.85">
      <rect x="1188" y="610" width="86" height="22" rx="3"/>
      <rect x="1282" y="610" width="86" height="22" rx="3"/>
      <rect x="1376" y="610" width="86" height="22" rx="3"/>
      <rect x="1470" y="610" width="42" height="22" rx="3"/>
    </g>
  </g>

  <!-- central showroom tables and boxes -->
  <g>
    <ellipse cx="800" cy="780" rx="410" ry="58" fill="rgba(0,0,0,0.55)"/>
    <rect x="660" y="602" width="280" height="120" rx="8" fill="#3a2c1e" opacity="0.95"/>
    <rect x="620" y="654" width="360" height="34" rx="4" fill="#5a4330"/>
    <rect x="710" y="690" width="170" height="46" rx="4" fill="#c7a56d" opacity="0.95"/>
    <rect x="686" y="640" width="76" height="30" rx="4" fill="#d7b88a"/>
    <rect x="778" y="638" width="76" height="30" rx="4" fill="#d7b88a"/>
    <rect x="870" y="640" width="76" height="30" rx="4" fill="#d7b88a"/>
    <rect x="640" y="692" width="96" height="58" rx="4" fill="#9b7448" opacity="0.95"/>
    <rect x="742" y="692" width="116" height="58" rx="4" fill="#a37c50" opacity="0.95"/>
    <rect x="864" y="692" width="96" height="58" rx="4" fill="#8a6740" opacity="0.95"/>
  </g>

  <!-- left / right floor boxes -->
  <g opacity="0.98">
    <g fill="#b7895a">
      <rect x="68" y="748" width="120" height="90" rx="4"/>
      <rect x="192" y="748" width="120" height="90" rx="4"/>
      <rect x="316" y="748" width="120" height="90" rx="4"/>
    </g>
    <g fill="#c8a06a">
      <rect x="1368" y="748" width="120" height="90" rx="4"/>
      <rect x="1244" y="748" width="120" height="90" rx="4"/>
      <rect x="1120" y="748" width="120" height="90" rx="4"/>
    </g>
    <g fill="#d8c09a">
      <rect x="118" y="718" width="90" height="34" rx="3"/>
      <rect x="230" y="718" width="90" height="34" rx="3"/>
      <rect x="1348" y="718" width="90" height="34" rx="3"/>
      <rect x="1238" y="718" width="90" height="34" rx="3"/>
    </g>
  </g>

  <!-- ABJ wall logo -->
  <g transform="translate(800 240)">
    <circle cx="0" cy="0" r="144" fill="none" stroke="#f4ead7" stroke-width="18" stroke-linecap="round" opacity="0.96" stroke-dasharray="760 120"/>
    <text x="0" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="132" font-weight="800" fill="#ffffff" letter-spacing="6">ABJ</text>
  </g>

  <!-- floor fade -->
  <rect width="1600" height="900" fill="url(#floor)"/>
</svg>

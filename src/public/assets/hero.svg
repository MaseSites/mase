<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171d"/>
      <stop offset="0.55" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.7" cy="0.25" r="0.7">
      <stop offset="0" stop-color="rgba(184,156,103,0.16)"/>
      <stop offset="1" stop-color="rgba(184,156,103,0)"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.6)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>
  <!-- dezente vertikale Struktur (Regale/Lamellen) -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="420" y1="0" x2="420" y2="900"/>
    <line x1="660" y1="0" x2="660" y2="900"/>
    <line x1="940" y1="0" x2="940" y2="900"/>
    <line x1="1180" y1="0" x2="1180" y2="900"/>
    <line x1="1420" y1="0" x2="1420" y2="900"/>
  </g>
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="230" x2="1600" y2="230"/>
    <line x1="0" y1="470" x2="1600" y2="470"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
  </g>
  <rect width="1600" height="900" fill="url(#floor)"/>
</svg>
